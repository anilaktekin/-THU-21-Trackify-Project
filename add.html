<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yeni İnceleme Ekle - Trackify</title> 
</head>

<body>
    <header>
        <div>
            <a href="index.html"><img src="images/logo.png" alt="Trackify Logo" width="200" height="125"></a>
        </div>
    </header>
    <hr style="border: 2px solid #000;">
    <main>
        <div>
            <h1>Yeni İnceleme Ekle</h1>

            <form action="#" method="post">
                <div>
                    <label for="baslik">İnceleme Başlığı:</label>
                    <input type="text" id="baslik" name="baslik" placeholder="İnceleme Başlığını Giriniz">
                </div>
                <div>
                    <label for="kategori">Kategori:</label>
                    <select id="kategori" name="kategori">
                        <option value="1">Kitap</option>
                        <option value="2">Film</option>
                        <option value="3">Dizi</option>
                    </select>
                </div>
                <div>
                    <label for="yazar">Yazar / Yönetmen :</label>
                    <input type="text" id="yazar" name="yazar" placeholder="Yazar / Yönetmeni Giriniz">
                </div>
                <div>
                    <label for="puan">Puanın:</label>
                    <select id="puan" name="puan">
                        <option value="1">⭐ </option>
                        <option value="2">⭐⭐ </option>
                        <option value="3">⭐⭐⭐ </option>
                        <option value="4">⭐⭐⭐⭐ </option>
                        <option value="5">⭐⭐⭐⭐⭐ </option>
                    </select>
                </div>
                <div>
                    <label for="yorum">Yorumun:</label>
                    <textarea id="yorum" name="yorum" rows="4" placeholder="İncelemeyi Giriniz"></textarea>
                </div>
                <div>
                    <label for="gorsel">Görsel:</label>
                    <input type="file" id="gorsel" name="gorsel" accept="image/*">
                </div>

                <button type="submit">İnceleme Ekle</button>
            </form>

        </div>
    </main>
</body>
