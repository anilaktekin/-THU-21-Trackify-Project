<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Ol — Trackify</title>
</head>
<body>

    <header>
        <div>
            <a href="index.html"><img src="images/logo.png" alt="Trackify Logo" width="200" height="125"></a>
        </div>
    </header>
    <hr style="border: 2px solid #000;">
    <main>
        <div>
            <h1>Kayıt Ol</h1>

            <form action="#" method="post">

                <div>
                    <label for="kullanici_adi">Kullanıcı Adı:</label>
                    <input type="text" id="kullanici_adi" name="kullanici_adi" placeholder="Kullanıcı adınız">
                </div>

                <div>
                    <label for="email">E-posta:</label>
                    <input type="email" id="email" name="email" placeholder="ornek@mail.com">
                </div>

                <div>
                    <label for="sifre">Şifre:</label>
                    <input type="password" id="sifre" name="sifre" placeholder="Şifreniz">
                </div>

                <div>
                    <label for="sifre_tekrar">Şifre Tekrar:</label>
                    <input type="password" id="sifre_tekrar" name="sifre_tekrar" placeholder="Şifrenizi tekrar girin">
                </div>

                <button type="submit">Kayıt Ol</button>

            </form>

            <p>Zaten hesabın var mı? <a href="login.html">Giriş Yap</a></p>
        </div>
    </main>
    <hr style="border: 2px solid #000;">
    <footer>
        <div>
            <p>© 2026 Trackify</p>
            <p>Tüm hakları saklıdır.</p>
        </div>
    </footer>

</body>
</html>
