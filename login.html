<!DOCTYPE html>
<html lang="tr">

<head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Trackify - Giriş Yap</title>
</head>

<body>
    <header>
        <div>
            <a href="index.html"><img src="images/logo.png" alt="Trackify Logo" width="200" height="125"></a>
        </div>
    </header>
    <hr style="border: 2px solid #000;">
    <main>
        <div>
            <h1>Giriş Yap</h1>
            <form action="#" method="post">
                <div>
                    <label for="email">E-posta : </label>
                    <input type="email" id="email" name="email" placeholder="E-posta adresinizi giriniz" required>
                </div>
                <div>
                    <label for="password">Şifre :</label>
                    <input type="password" id="password" name="password" placeholder="Şifrenizi giriniz" required>
                </div>
                <button type="submit">Giriş Yap</button>
            </form>

            <p>Kayıt Olmak İçin <a href="register.html">Tıklayınız</a></p>
        </div>
    </main>
    <hr style="border: 2px solid #000;">
    <footer>
        <div>
            <a href="index.html"><img src="images/logo.png" alt="Trackify Logo" width="200" height="125"></a>
            <p>2026 Trackify</p>
            <p>Tüm hakları saklıdır.</p>
        </div>
    </footer>
</body>
